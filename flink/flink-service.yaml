apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
spec:
  selector:
    app: flink
    component: jobmanager
  ports:
    - name: ui
      port: 8081
      targetPort: 8081
    - name: blob
      port: 6124
      targetPort: 6124
    - name: rpc
      port: 6123
      targetPort: 6123
---

apiVersion: v1
kind: Service
metadata:
  name: flink-taskmanager
spec:
  clusterIP: None
  selector:
    app: flink
    component: taskmanager
  ports:
    - port: 6121
      name: data
