apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: flink-jobmanager
spec:
  serviceName: flink-jobmanager
  replicas: 1
  selector:
    matchLabels:
      app: flink
      component: jobmanager
  template:
    metadata:
      labels:
        app: flink
        component: jobmanager
      annotations:
        vault.hashicorp.com/agent-inject: "true"

        vault.hashicorp.com/role: "flink-role"

        vault.hashicorp.com/agent-inject-secret-config: "kv/data/flink-secrets"

        vault.hashicorp.com/agent-inject-template-config: |
                {{- with secret "kv/data/flink-secrets" -}}
                {{- range $k, $v := .Data.data }}
                {{ $k }}={{ $v }}
                {{- end }}
                {{- end }}
    spec:
      serviceAccountName: myapp-sa
      containers:
        - name: jobmanager
          image: flink:1.18
          args: ["jobmanager"]
          ports:
            - containerPort: 8081
              name: ui
            - containerPort: 6123
              name: rpc

          volumeMounts:
            - name: flink-config
              mountPath: /opt/flink/conf/flink-conf.yaml
              subPath: flink-conf.yaml
      volumes:
        - name: flink-config
          configMap:
            name: flink-config

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: flink-taskmanager
spec:
  serviceName: flink-taskmanager
  replicas: 2
  selector:
    matchLabels:
      app: flink
      component: taskmanager
  template:
    metadata:
      labels:
        app: flink
        component: taskmanager
      annotations:
        vault.hashicorp.com/agent-inject: "true"

        vault.hashicorp.com/role: "flink-role"

        vault.hashicorp.com/agent-inject-secret-config: "kv/data/flink-secrets"

        vault.hashicorp.com/agent-inject-template-config: |
                {{- with secret "kv/data/flink-secrets" -}}
                {{- range $k, $v := .Data.data }}
                {{ $k }}={{ $v }}
                {{- end }}
                {{- end }}
    spec:
      serviceAccountName: myapp-sa
      containers:
        - name: taskmanager
          image: flink:1.18
          args: ["taskmanager"]
          ports:
            - containerPort: 6121
            - containerPort: 6122
          env:
            - name: JOB_MANAGER_RPC_ADDRESS
              value: flink-jobmanager
          volumeMounts:
            - name: flink-config
              mountPath: /opt/flink/conf/flink-conf.yaml
              subPath: flink-conf.yaml
      volumes:
        - name: flink-config
          configMap:
            name: flink-config
