apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: flink-jobmanager
spec:
  serviceName: flink-jobmanager
  replicas: 1
  selector:
    matchLabels:
      app: flink
      component: jobmanager
  template:
    metadata:
      labels:
        app: flink
        component: jobmanager
    spec:
      containers:
        - name: jobmanager
          image: flink:1.18
          args: ["jobmanager"]
          ports:
            - containerPort: 8081
              name: ui
            - containerPort: 6123
              name: rpc

          volumeMounts:
            - name: flink-config
              mountPath: /opt/flink/conf/flink-conf.yaml
              subPath: flink-conf.yaml
      volumes:
        - name: flink-config
          configMap:
            name: flink-config

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: flink-taskmanager
spec:
  serviceName: flink-taskmanager
  replicas: 2
  selector:
    matchLabels:
      app: flink
      component: taskmanager
  template:
    metadata:
      labels:
        app: flink
        component: taskmanager
    spec:
      containers:
        - name: taskmanager
          image: flink:1.18
          args: ["taskmanager"]
          ports:
            - containerPort: 6121
            - containerPort: 6122
          env:
            - name: JOB_MANAGER_RPC_ADDRESS
              value: flink-jobmanager
          volumeMounts:
            - name: flink-config
              mountPath: /opt/flink/conf/flink-conf.yaml
              subPath: flink-conf.yaml
      volumes:
        - name: flink-config
          configMap:
            name: flink-config
