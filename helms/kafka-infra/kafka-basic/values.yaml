namespace: kafka
serviceName: kafka-service
replica: 1
headlessName: kafka-headless

env_vars:
  KAFKA_NODE_ID: "1"
  KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
  KAFKA_ADVERTISED_LISTENERS: EXTERNAL://192.168.1.77:30030,INTERNAL://kafka-headless.kafka:9092
  KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-headless.kafka:9093"
  KAFKA_NUM_PARTITIONS: "1"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: "10"
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  ALLOW_PLAINTEXT_LISTENER: "yes"

volumeMounts:
  name: kafka-data
  mountPath: /var/lib/kafka/data

nodePort: 30030
