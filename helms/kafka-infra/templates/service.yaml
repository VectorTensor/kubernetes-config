apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.headlessName }}
  labels:
    app: {{ include "kafka-infra.fullname" . }}
spec:
  clusterIP: None
  ports:
    - name: broker
      port: 9092
    - name: controller
      port: 9093
  selector:
    app: {{ include "kafka-infra.fullname" . }}

---

apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.serviceName }}
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    statefulset.kubernetes.io/pod-name: {{ include "kafka-infra.serviceName" . }}
  ports:
    - port: 9094
      targetPort: 9094
      nodePort: {{ .Values.nodePort }}
