replicaCount: 2

image:
  repository: 387555629933.dkr.ecr.us-east-1.amazonaws.com/lan-dashboard
  tag: 0.0.9
  pullPolicy: IfNotPresent
  pullSecrets:
    - name: ecr-registry
service:
  type: NodePort
  port: 80
  nodePort: 30080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

env:
  ENVIRONMENT: production

livenessProbe:
  path: /health
  port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /health
  port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

vault:
  role: nextjs
  secretPath: secret/data/lan-dashboard

serviceAccount:
  name: myapp-sa
