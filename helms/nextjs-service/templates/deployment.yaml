apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nextjs-service.fullname" . }}
  labels:
    app: {{ include "nextjs-service.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "nextjs-service.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "nextjs-service.name" . }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"

        vault.hashicorp.com/role: "{{ .Values.vault.role }}"

        vault.hashicorp.com/agent-inject-secret-config: "{{ .Values.vault.secretPath }}"

        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret "`}}{{ .Values.vault.secretPath }}{{`" -}}`}}
          {{`{{- range $k, $v := .Data.data }}`}}
          {{ `export {{ $k }}`}}={{`{{ $v }}`}}
          {{`{{- end }}`}}
          {{`{{- end }}`}}

    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      # Pull secret for private ECR
      imagePullSecrets:
        {{- range .Values.image.pullSecrets }}
        - name: {{ .name }}
        {{- end }}
      containers:
        - name: {{ include "nextjs-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["./prod-deploy.sh"]
          ports:
            - containerPort: 3000
          env:
            - name: ENVIRONMENT
              value: "{{ .Values.env.ENVIRONMENT }}"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
